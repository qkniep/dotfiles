# truecolor (24-bit) support; advertise RGB for the outer terminal (Ghostty)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"

# fix delay on escape (a pain for VIM mode)
set -sg escape-time 0

set -g mouse on
set -g history-limit 65536

set -g base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g set-clipboard on
setw -g pane-base-index 1

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-S-h previous-window
bind -n M-S-l next-window

setw -g mode-keys vi

# more intuitive VIM-like visual selection
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# open new splits in current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# lazygit in a centered popup, scoped to the current pane's repo
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" lazygit

set -g @kripto_icon "SOL"
set -g @kripto_icon_hide "true"
set -g @kripto_id "solana"
set -g @kripto_currency "usd"
set -g @kripto_ttl 900  # cache time in seconds

# Weather: the status-right calls our weather.sh wrapper (not the plugin's
# #{weather} placeholder) so wttr.in error blurbs collapse to "??" instead of
# overflowing the bar. The wrapper still shells out to the plugin's cached
# script, which reads this format option.
set-option -g @tmux-weather-format "%t"

set -g @batt_color_charge_primary_tier8 "green"
set -g @batt_color_charge_primary_tier7 "green"
set -g @batt_color_charge_primary_tier6 "green"
set -g @batt_color_charge_primary_tier5 "green"
set -g @batt_color_charge_primary_tier4 "yellow"
set -g @batt_color_charge_primary_tier3 "yellow"
set -g @batt_color_charge_primary_tier2 "red"
set -g @batt_color_charge_primary_tier1 "red"
set -g @batt_color_status_primary_charged "green"
set -g @batt_color_status_primary_charging "blue"

set -g pane-border-lines single
set -g pane-border-style "fg=brightblack"
set -g pane-border-indicators off
set -g pane-active-border-style "fg=brightblack"

set -g window-style "bg=default" # change this to dim inactive panes
set -g window-active-style "bg=default"

# Tab pill colors. ANSI "black"/"white" don't flip with light terminal themes,
# so the fish `theme` function (configs/fish/config.fish) writes an override
# snippet for light themes; sourcing it keeps the tabline matching the active
# Ghostty/nvim colorscheme across tmux server restarts.
set -g @tab-bg "black"
set -g @tab-fg "white"
source -q ~/.local/state/tmux/theme.conf

# popup message bar style
set -g message-style "fg=black,bg=yellow"
set -g message-command-style "fg=black,bg=yellow"

set -g status-style "fg=white,bg=default"
set -g status-left "#[fg=black,bg=green]  #S#[fg=green,bg=default] "
set -g status-right "#[fg=yellow,bg=default]#[fg=black,bg=yellow]  #{kripto}#[fg=yellow,bg=default] \
#[fg=blue]#[fg=black,bg=blue]  #(~/.config/tmux/weather.sh)#[fg=blue,bg=default] \
#{battery_color_fg}#[bg=default]#{battery_color_bg}#[fg=black]󱐋 #{battery_percentage}\u00A0"
#set -g status-right "#[fg=yellow,bg=default]#[fg=black,bg=yellow] #[fg=#{@tab-fg},bg=#{@tab-bg}] #{kripto}#[fg=#{@tab-bg},bg=default] \
#[fg=blue]#[fg=black,bg=blue] #[fg=#{@tab-fg},bg=#{@tab-bg}] #(~/.config/tmux/weather.sh)#[fg=#{@tab-bg},bg=default] \
#{battery_color_fg}#{battery_color_bg}#[fg=black]󱐋 #{battery_percentage}\u00A0"
#[fg=blue]#[fg=black,bg=blue]󰃰 #[fg=white,bg=black] %H:%M#[fg=black,bg=default]
set -g status-right-length 40
set -g status-position top
set -g status-justify left

# Surface session state in the tabline (background windows only):
#   @claude-state == "waiting"  -> bright red index segment (needs input)
#   @claude-state == "done"     -> bright red 󰚩 segment (finished — come look;
#                                  cleared on focus by the hook below)
#   @build-state  == "running"  -> cyan segment with 󰜎 (build in flight)
#   @claude-state == "thinking" -> yellow segment with 󰚩 (index hidden)
# Hooks in claude/*-settings.json drive @claude-state through the turn
# lifecycle (see configs/claude/hooks/tmux-state.sh); fish_preexec/postexec in
# configs/fish/config.fish set/clear @build-state for cargo/nix/etc. Both
# call `refresh-client -S` so short turns aren't missed by the
# status-interval poll. Precedence: waiting > done > running > thinking > default.

set -g window-status-style "fg=brightblack"
set -g window-status-activity-style ""
set -g window-status-separator " "
set -g window-status-format "#{?#{==:#{@claude-state},waiting},#[fg=brightred]#[fg=black]#[bg=brightred]#I #[fg=#{@tab-fg}]#[bg=#{@tab-bg}] #W#[fg=#{@tab-bg}]#[bg=default],\
#{?#{==:#{@claude-state},done},#[fg=brightred]#[fg=black]#[bg=brightred]󰚩 #[fg=#{@tab-fg}]#[bg=#{@tab-bg}] #W#[fg=#{@tab-bg}]#[bg=default],\
#{?#{==:#{@build-state},running},#[fg=magenta]#[fg=black]#[bg=magenta] #[fg=#{@tab-fg}]#[bg=#{@tab-bg}] #W#[fg=#{@tab-bg}]#[bg=default],\
#{?@claude-state,#[fg=colour215]#[fg=black]#[bg=colour215]󰚩 #[fg=#{@tab-fg}]#[bg=#{@tab-bg}] #W#[fg=#{@tab-bg}]#[bg=default],\
#[fg=#{@tab-bg}]#[fg=#{@tab-fg}]#[bg=#{@tab-bg}]#I #[fg=#{@tab-fg}]#[bg=#{@tab-bg}] #W#[fg=#{@tab-bg}]#[bg=default]}}}}"
set -g window-status-current-format "#[fg=green]#[fg=black,bg=green]#I #[fg=#{@tab-fg},bg=#{@tab-bg}] #W#{?window_zoomed_flag, 󰍉,}#[fg=#{@tab-bg},bg=default]"

# Focusing a window acknowledges a finished Claude turn: clear "done" (but keep
# "waiting" — a pending permission prompt stays red until answered).
set-hook -g session-window-changed 'if -F "#{==:#{@claude-state},done}" "set -w -u @claude-state"'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'vascomfnunes/tmux-kripto'
set -g @plugin 'christoomey/vim-tmux-navigator'
run '~/.config/tmux/plugins/tpm/tpm'
